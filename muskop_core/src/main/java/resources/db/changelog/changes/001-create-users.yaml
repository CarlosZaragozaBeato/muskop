databaseChangeLog:
  - changeSet:
      id: 001-create-users
      author: muskop
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_user_muskop

              - column:
                  name: username
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true

        - createIndex:
            tableName: users
            indexName: idx_users
            columns:
              - column:
                  name: username