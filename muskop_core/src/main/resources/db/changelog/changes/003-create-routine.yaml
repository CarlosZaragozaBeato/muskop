databaseChangeLog:
  - changeSet:
      id: 003-create-routine
      author: muskop
      changes:
        - createTable:
            tableName: routine
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: text
                  constraints:
                    nullable: true