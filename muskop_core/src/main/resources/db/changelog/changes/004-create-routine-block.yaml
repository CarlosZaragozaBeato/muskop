databaseChangeLog:
  - changeSet:
      id: 004-create-routine-block
      author: muskop
      changes:
        - createTable:
            tableName: block_routine
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: routine_id
                  type: int
                  constraints:
                    nullable: false
                    foreignKeyName: fk_block_routine
                    references: routine(id)
                    deleteCascade: true
              - column:
                  name: resource_id
                  type: int
                  constraints:
                    nullable: true
                    foreignKeyName: fk_block_resource
                    references: resource(id)
              - column:
                  name: min_duration
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: bpm
                  type: int
              - column:
                  name: display_order
                  type: int
                  constraints:
                    nullable: false

  - changeSet:
      id: 4-link-user-with-routines-and-resources
      author: muskop
      changes:
        - addColumn:
            tableName: routine
            columns:
              - column:
                  name: user_id
                  type: int
                  constraints:
                    nullable: false
                    foreignKeyName: fk_routine_user
                    references: users(id)
                    deleteCascade: true

        - addColumn:
            tableName: resource
            columns:
              - column:
                  name: user_id
                  type: int
                  constraints:
                    nullable: false
                    foreignKeyName: fk_resource_user
                    references: users(id)
                    deleteCascade: true